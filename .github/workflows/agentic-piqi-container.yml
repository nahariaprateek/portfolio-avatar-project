name: Agentic PIQI Container

on:
  push:
    branches:
      - main
    tags:
      - "agentic-piqi-v*"
    paths:
      - "Healthcare agentic AI solutions with AI created Dashboards/agentic_piqi/**"
      - ".github/workflows/agentic-piqi-container.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agentic-piqi
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: "./Healthcare agentic AI solutions with AI created Dashboards/agentic_piqi"
          file: "./Healthcare agentic AI solutions with AI created Dashboards/agentic_piqi/Dockerfile"
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/agentic-piqi-v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
