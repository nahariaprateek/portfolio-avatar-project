name: Feature request
description: Propose a new capability for the portfolio site or Agentic PIQI project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agentic PIQI
        - Portfolio site
        - CI/CD
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What business or engineering problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired workflow, API, or behavior.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain the value, users affected, or risks reduced.
